version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainlearn
      POSTGRES_PASSWORD: chainlearn_dev
      POSTGRES_DB: chainlearn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app-test:
    build:
      context: .
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: sh -c "npx drizzle-kit push && npx vitest run src/test/cache.test.ts"

volumes:
  pgdata:
  redisdata:
